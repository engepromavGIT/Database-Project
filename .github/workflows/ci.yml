# CI do módulo Base de Projetos.
# Dois jobs em cada PR para a main e em cada push na main:
#   - verificacao: check → test (Node) → build, o pipeline do build-check-log.md;
#   - testes-python: pytest das funções puras do ETL (scripts/).
# NÃO toca banco: os testes Node incluem endpoints, mas com o banco mockado (seam __setQueryImpl);
# o build do Vite não precisa de DATABASE_URL nem de segredos; o pytest do ETL não abre conexão.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela execuções antigas do mesmo PR/branch quando chega um push novo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verificacao:
    name: check · test · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      # `npm ci` respeita o package-lock.json. A dependência `xlsx` vem de uma URL do
      # CDN da SheetJS (não do registry) — o runner tem internet, então instala normal.
      - name: Instalar dependências
        run: npm ci

      - name: Sintaxe (node --check)
        run: npm run check

      - name: Testes (Node — funções puras + endpoints com banco mockado)
        run: npm test

      - name: Build (Vite)
        run: npm run build

  testes-python:
    name: pytest (ETL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            scripts/requirements.txt
            scripts/requirements-dev.txt

      # requirements-dev.txt puxa requirements.txt (pdfplumber + psycopg2-binary) e o pytest.
      - name: Instalar dependências (ETL + pytest)
        run: pip install -r scripts/requirements-dev.txt

      - name: pytest (funções puras do ETL, sem banco)
        run: python -m pytest scripts/tests -q
